services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: hotel_postgres
    environment:
      POSTGRES_DB: hotel_chatbot
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_user -d hotel_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotel_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tei-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: hotel_tei
    ports:
      - "8002:80"
    volumes:
      - tei_model_cache:/data
    command: --model-id jinaai/jina-embeddings-v5-text-nano
    restart: unless-stopped

  waha:
    image: devlikeapro/waha
    container_name: hotel_waha
    ports:
      - "3000:3000"
    volumes:
      - waha_data:/app/.sessions
    environment:
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WHATSAPP_HOOK_URL=http://backend:8001/api/v1/webhook/whatsapp
      - WAHA_DASHBOARD_ENABLED=true
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: hotel_backend
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://hotel_user:hotel_pass@postgres:5432/hotel_chatbot
      - LLM_BASE_URL=http://host.docker.internal:8000
      - WAHA_URL=http://waha:3000
      - REDIS_URL=redis://redis:6379/0
      - TEI_URL=http://tei-embeddings:80
    env_file:
      - ../.env
    volumes:
      - ..:/app
    restart: unless-stopped

  celery_worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: hotel_celery_worker
    command: celery -A backend.tasks.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://hotel_user:hotel_pass@postgres:5432/hotel_chatbot
      - REDIS_URL=redis://redis:6379/0
      - TEI_URL=http://tei-embeddings:80
    env_file:
      - ../.env
    volumes:
      - ..:/app
    restart: unless-stopped

volumes:
  postgres_data:
  waha_data:
  tei_model_cache:
