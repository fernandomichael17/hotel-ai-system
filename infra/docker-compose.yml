version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hotel_chatbot
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_pass
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
    ports: 
      - "8001:8001"
    depends_on: 
      - postgres
    env_file:
      - .env
    volumes: 
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  postgres_data:
